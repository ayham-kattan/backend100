name: Node.js CI

on:
  push:
    branches: [ "main", "staging" ]

jobs:
  test-and-deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      # ✅ Deploy only on main
      - name: Deploy to production
        run: |
          cd ~/apps/backend100
          git pull origin main
          npm install
          npm install -g pm2 
          pm2 restart backend100


      - name: Debug Node
        run: |
          which node
          node -v
          which npm
          npm config get prefix